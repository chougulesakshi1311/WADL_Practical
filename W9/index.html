<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-App</title>

    <style>
        body {
            font-family:Arial, Helvetica, sans-serif;
            margin-top: 50px;
            text-align: center;
            background-color: rgb(143, 191, 132);
        }
        .container {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 2px solid white;
            flex: auto;
            background-color: rgb(254, 254, 254);
            border-radius: 10px;
            box-shadow: 0px 0px 3px 0px black;
        }
        h1{
            font-size: 40px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>Weather App</h1>
        <input type="text" id="cityInput" placeholder="Enter your city">
        <button onclick="getWeather()">Get Weather</button>
        <div id="result"></div>
    </div>

    <script>
        function getWeather() {
            const city = document.getElementById('cityInput').value.trim().toLowerCase();
            const xhr = new XMLHttpRequest();
            xhr.open("GET", "weather.json", true);
            xhr.onload = function() {
                if(this.status === 200) {
                    const data = JSON.parse(this.responseText);
                    const cityData = data.find(c => c.name.toLowerCase() === city);
                    const resultDiv = document.getElementById('result');
                    if(cityData) {
                        resultDiv.innerHTML = `
                            <strong>${cityData.name}</strong><br>
                            Temperature: ${cityData.temperature}<br>
                            Humidity: ${cityData.humidity}<br>
                            Condition: ${cityData.condition}
                        `;
                    }
                    else {
                        resultDiv.innerHTML = "City Not found in local data.";
                    }
                }
            };
            xhr.send();
        }
    </script>

</body>
</html>
