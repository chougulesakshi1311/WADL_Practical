<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">User Registration Form</h3>

        <form class="needs-validation" novalidate>

            <!-- Name -->
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" placeholder="Name"
                       required data-bs-toggle="tooltip" title="Enter your full name">
                <label for="name">Full Name</label>
                <div class="invalid-feedback">Please enter your name</div>
            </div>

            <!-- Email -->
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email"
                       required data-bs-toggle="tooltip" title="Enter your email">
                <label for="email">Email</label>
                <div class="invalid-feedback">Please enter your email</div>
            </div>

            <!-- Phone -->
            <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="phone" placeholder="Phone"
                       required data-bs-toggle="tooltip" title="Enter your phone number">
                <label for="phone">Phone Number</label>
                <div class="invalid-feedback">Please enter your phone number</div>
            </div>

            <!-- Event -->
            <div class="mb-3">
                <label for="event" class="form-label">Select Event</label>
                <select id="event" class="form-select"
                        required data-bs-toggle="tooltip" title="Choose event">
                    <option value="">Choose...</option>
                    <option>Workshop</option>
                    <option>Seminar</option>
                    <option>Hackathon</option>
                </select>
                <div class="invalid-feedback">Please select an event</div>
            </div>

            <!-- Checkbox -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label" for="terms">I agree to terms</label>
                <div class="invalid-feedback">You must agree before submit</div>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-primary w-100">Register</button>

        </form>

        <!-- Success Message -->
        <div id="successMsg" class="alert alert-success mt-3 d-none">
            Form submitted successfully!
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Enable tooltips
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    tooltipTriggerList.map(function(el) {
        return new bootstrap.Tooltip(el);
    });

    // Form Validation + Prevent Refresh
    (() => {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')

        Array.from(forms).forEach(form => {
            form.addEventListener('submit', function(event) {

                event.preventDefault(); // 🚫 stops refresh always

                if (!form.checkValidity()) {
                    event.stopPropagation();
                } else {
                    document.getElementById("successMsg").classList.remove("d-none");
                }

                form.classList.add('was-validated');

            }, false);
        });
    })();
</script>

</body>
</html>
