<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Directory</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 10px;
        }

        h2 {
            text-align: center;
            margin: 20px;
            color: #333;
            font-size: 32px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .card p {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Product Directory</h2>
    <div class="container" id="products"></div>

    <script>
        fetch('./api/products')
            .then(res => res.json())
            .then(data => {
                let output = "";

                data.forEach(product => {
                    output += `
                        <div class="card">
                            <img src="${product.image}">
                            <h3>${product.name}</h3>
                            <p>₹ ${product.price}</p>
                        </div>
                    `;
                });

                document.getElementById('products').innerHTML = output;
            });
    </script>
</body>
</html>
