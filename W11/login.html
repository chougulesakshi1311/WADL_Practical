<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; text-align: center; background:#667eea; color:white; }
        .box { background:white; color:black; padding:20px; width:300px; margin:80px auto; border-radius:10px; }
        input { width:90%; padding:8px; margin:5px; }
        button { padding:10px; background:#667eea; color:white; border:none; cursor:pointer; }
    </style>
</head>
<body>

    <h2>Login</h2>
    <div class="box">
        <input type="text" id="user" placeholder="Username"><br>
        <input type="password" id="pass" placeholder="Password"><br>

        <button onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            const username = document.getElementById("user").value;
            const password = document.getElementById("pass").value;

            let users = JSON.parse(localStorage.getItem("users")) || [];

            const found = users.find(u => u.username === username && u.password === password);

            if (found) {
                alert("Login Successful");

                // store logged user
                localStorage.setItem("currentUser", username);

                window.location.href = "data.html";
            } else {
                alert("Invalid Credentials");
            }
        }
    </script>

</body>
</html>
