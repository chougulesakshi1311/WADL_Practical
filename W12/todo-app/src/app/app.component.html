<div class="todo-container">
  <h2>My To-Do List</h2>
  
  <div class="input-area">
    <!-- Two-way binding: [(ngModel)] links input value directly to 'newTask' variable -->
    <input type="text" [(ngModel)]="newTask" placeholder="Enter a task..." />
    <button (click)="saveTask()" class="btn-primary">
      {{ editTaskIndex !== null ? 'Update' : 'Add' }}
    </button>
  </div>

  <ul class="task-list">
    <li *ngFor="let task of tasks; let i = index">
      <span class="task-text">{{ task }}</span>
      <div class="actions">
        <button (click)="editTask(i)" class="btn-edit">Edit</button>
        <button (click)="deleteTask(i)" class="btn-delete">Delete</button>
      </div>
    </li>
  </ul>
</div>
