<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX TO-DO LIST</title>
    <style>
        body {
            font-family: Arial;
            max-width: 500px;
            margin: 30px auto;
            background-color: rgb(78, 169, 111);
            
        }

        input[type="text"] {
            width: 60%;
            padding: 8px;
        }

        button {
            padding: 8px;
            margin-left: 5px;
        }

        li {
            margin-top: 10px;
            list-style:disc;
        }
    </style>
</head>

<body>
    <h1>TO-DO List</h1>
    <input type="text" placeholder="Add a task" id="taskInput">
    <button onClick="addTask()">Add</button>
    <ul id="taskList"></ul>


    <script>
        function ajax(method, url, data, callback) {
            const xhr = new XMLHttpRequest();
            xhr.open(method, url);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = () => callback(JSON.parse(xhr.responseText));
            xhr.send(data ? JSON.stringify(data) : null);
        }
        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `
                <input type="text" value="${task.name}" onChange="updateTask(${task.id},this.value)">
                <button onClick="deleteTask(${task.id},this.value)">❌</button>
                `;
                list.appendChild(li);

            });
        }
        function loadTasks() {
            ajax("GET", "/tasks", null, renderTasks);
        }
        function addTask() {
            const input = document.getElementById('taskInput');
            const name = input.value.trim();
            if (!name) return;
            ajax("POST", "/tasks", { name }, loadTasks);
            input.value = "";
        }
        function updateTask(id, name) {
            ajax("PUT", `/tasks/${id}`, { name }, loadTasks);
        }
        function deleteTask(id, name) {
            ajax("DELETE", `/tasks/${id}`, null, loadTasks);
        }
        loadTasks();

    </script>
</body>

</html>
